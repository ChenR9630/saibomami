<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tripo Topology A/B Compare</title>
  <style>
    body { margin: 0; background: #f5f3e9; color: #151515; font-family: Inter, Arial, sans-serif; }
    header { padding: 18px 24px; border-bottom: 1px solid #d8d4c7; }
    h1 { font-size: 20px; margin: 0 0 6px; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; padding: 12px; }
    .card { background: #111; color: #eee; border: 1px solid #333; }
    .label { display: flex; justify-content: space-between; padding: 8px 10px; font-size: 12px; letter-spacing: .04em; }
    .stage { height: 360px; }
    .meta { color: #9cff38; }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .stage { height: 300px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Tripo Topology A/B Compare</h1>
    <div id="runLabel">Loading saved topology test...</div>
  </header>
  <main class="grid" id="grid"></main>
  <script src="./topology-compare.bundle.js"></script>
</body>
</html>
